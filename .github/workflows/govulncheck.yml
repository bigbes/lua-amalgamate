name: govulncheck

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  # Re-scan weekly so newly-disclosed vulnerabilities in pinned dependencies are
  # caught even when the code hasn't changed.
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
