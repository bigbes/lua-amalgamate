name: Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: test -z "$(gofmt -d .)" || (echo "Code is not formatted correctly"; gofmt -d .; exit 1)

      - name: Build
        run: go build ./cmd/lua-amalgamate